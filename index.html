<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple PDF Signer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f4f6;
      --panel: #ffffff;
      --line: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --brand: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .left-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-width: 0;
    }

    h1, h2, h3 { margin: 0; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      font-size: 14px;
    }

    .toolbar label { color: var(--muted); font-weight: 600; }

    input[type="file"], select, button {
      font: inherit;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
    }

    button {
      cursor: pointer;
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .canvas-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafafa;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
      position: relative;
    }

    .preview-stage {
      position: relative;
      max-width: 100%;
      width: fit-content;
      line-height: 0;
    }

    #pdfPreview {
      border: 1px solid #e5e7eb;
      background: white;
      max-width: 100%;
      height: auto;
    }

    #signatureBox {
      position: absolute;
      border: 2px dashed #ef4444;
      min-width: 40px;
      min-height: 20px;
      resize: both;
      overflow: hidden;
      cursor: move;
      display: none;
      touch-action: none;
      background: rgba(255,255,255,0.1);
    }

    #signatureBox img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    .right-panel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      min-height: 0;
    }

    .pdf-list {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fbfbfc;
      min-height: 260px;
      max-height: calc(100vh - 260px);
    }

    .pdf-item {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px;
      background: white;
      margin-bottom: 8px;
      align-items: start;
    }

    .pdf-item canvas {
      width: 58px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
    }

    .pdf-item p {
      margin: 0 0 4px;
      font-size: 12px;
      word-break: break-word;
    }

    .muted { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel left-panel">
      <div class="toolbar">
        <h2>PDF Sign Preview</h2>
        <label for="signatureInput">Upload signature</label>
        <input id="signatureInput" type="file" accept="image/png,image/jpeg,image/webp" />
        <label for="signatureSelect">Choose signature</label>
        <select id="signatureSelect"></select>
        <span class="muted">Drag + resize the red box on first-page preview.</span>
      </div>

      <div class="canvas-wrap">
        <div class="preview-stage" id="previewStage">
          <canvas id="pdfPreview"></canvas>
          <div id="signatureBox">
            <img id="signatureImg" alt="signature" />
          </div>
        </div>
      </div>
    </section>

    <aside class="panel right-panel">
      <h3>PDF Queue</h3>
      <div>
        <input id="pdfInput" type="file" accept="application/pdf" multiple />
      </div>
      <div class="pdf-list" id="pdfList"></div>
      <button id="signNowBtn" disabled>Sign now</button>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs';
    import { PDFDocument } from 'https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/+esm';
    import JSZip from 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs';

    const signatureInput = document.getElementById('signatureInput');
    const signatureSelect = document.getElementById('signatureSelect');
    const signatureImg = document.getElementById('signatureImg');
    const signatureBox = document.getElementById('signatureBox');
    const pdfInput = document.getElementById('pdfInput');
    const pdfList = document.getElementById('pdfList');
    const signNowBtn = document.getElementById('signNowBtn');
    const pdfPreview = document.getElementById('pdfPreview');
    const previewStage = document.getElementById('previewStage');

    let signatures = [];
    let pdfEntries = [];
    let selectedPdfId = null;

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadSignatures() {
      signatures = JSON.parse(localStorage.getItem('pdf_signer_signatures') || '[]');
      if (!Array.isArray(signatures)) signatures = [];
      renderSignatureSelect();
    }

    function saveSignatures() {
      localStorage.setItem('pdf_signer_signatures', JSON.stringify(signatures));
    }

    function renderSignatureSelect() {
      signatureSelect.innerHTML = '';
      if (!signatures.length) {
        const empty = document.createElement('option');
        empty.textContent = 'No signature saved';
        empty.value = '';
        signatureSelect.appendChild(empty);
        signatureBox.style.display = 'none';
        return;
      }

      signatures.forEach((sig, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `Signature ${i + 1}`;
        signatureSelect.appendChild(option);
      });

      signatureSelect.value = '0';
      applySelectedSignature();
    }

    function applySelectedSignature() {
      const idx = Number(signatureSelect.value);
      const sig = signatures[idx];
      if (!sig) {
        signatureBox.style.display = 'none';
        return;
      }

      signatureImg.src = sig.dataUrl;
      signatureBox.style.display = selectedPdfId ? 'block' : 'none';
      if (!signatureBox.style.width) {
        signatureBox.style.width = '160px';
        signatureBox.style.height = '80px';
        signatureBox.style.left = '24px';
        signatureBox.style.top = '24px';
      }
    }

    signatureInput.addEventListener('change', async () => {
      const file = signatureInput.files?.[0];
      if (!file) return;
      const dataUrl = await readFileAsDataURL(file);
      signatures.push({
        id: crypto.randomUUID(),
        name: file.name,
        type: file.type,
        dataUrl
      });
      saveSignatures();
      renderSignatureSelect();
      signatureSelect.value = String(signatures.length - 1);
      applySelectedSignature();
      signatureInput.value = '';
    });

    signatureSelect.addEventListener('change', applySelectedSignature);

    pdfInput.addEventListener('change', async () => {
      const files = Array.from(pdfInput.files || []);
      for (const file of files) {
        const id = crypto.randomUUID();
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const page1 = await pdf.getPage(1);
        const viewport = page1.getViewport({ scale: 0.18 });
        const thumbCanvas = document.createElement('canvas');
        thumbCanvas.width = viewport.width;
        thumbCanvas.height = viewport.height;
        await page1.render({ canvasContext: thumbCanvas.getContext('2d'), viewport }).promise;

        pdfEntries.push({
          id,
          name: file.name,
          bytes,
          pageCount: pdf.numPages,
          thumbDataUrl: thumbCanvas.toDataURL('image/png'),
          checked: true
        });
      }

      pdfInput.value = '';
      renderPdfList();
      if (!selectedPdfId && pdfEntries.length) {
        selectedPdfId = pdfEntries[0].id;
      }
      await renderMainPreview();
      updateSignButton();
    });

    function renderPdfList() {
      pdfList.innerHTML = '';
      pdfEntries.forEach((entry) => {
        const item = document.createElement('div');
        item.className = 'pdf-item';

        const thumb = document.createElement('canvas');
        const img = new Image();
        img.onload = () => {
          thumb.width = 58;
          thumb.height = 76;
          const ctx = thumb.getContext('2d');
          ctx.clearRect(0, 0, thumb.width, thumb.height);
          ctx.drawImage(img, 0, 0, thumb.width, thumb.height);
        };
        img.src = entry.thumbDataUrl;

        const info = document.createElement('div');
        const name = document.createElement('p');
        name.textContent = entry.name;
        const pages = document.createElement('p');
        pages.className = 'muted';
        pages.textContent = `${entry.pageCount} page(s)`;

        const row = document.createElement('label');
        row.className = 'muted';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = entry.checked;
        checkbox.addEventListener('change', () => {
          entry.checked = checkbox.checked;
          updateSignButton();
        });
        row.append(checkbox, document.createTextNode(' Include'));

        const previewBtn = document.createElement('button');
        previewBtn.textContent = 'Preview';
        previewBtn.style.padding = '4px 8px';
        previewBtn.addEventListener('click', async () => {
          selectedPdfId = entry.id;
          await renderMainPreview();
        });

        info.append(name, pages, row, previewBtn);
        item.append(thumb, info);
        pdfList.appendChild(item);
      });
    }

    async function renderMainPreview() {
      const selected = pdfEntries.find((e) => e.id === selectedPdfId);
      if (!selected) {
        const ctx = pdfPreview.getContext('2d');
        pdfPreview.width = 640;
        pdfPreview.height = 420;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, pdfPreview.width, pdfPreview.height);
        ctx.fillStyle = '#6b7280';
        ctx.font = '18px sans-serif';
        ctx.fillText('Upload PDFs to start preview', 20, 42);
        signatureBox.style.display = 'none';
        return;
      }

      const pdf = await pdfjsLib.getDocument({ data: selected.bytes }).promise;
      const page1 = await pdf.getPage(1);
      const unscaled = page1.getViewport({ scale: 1 });
      const maxWidth = Math.min(previewStage.parentElement.clientWidth - 24, 880);
      const scale = Math.max(0.25, maxWidth / unscaled.width);
      const viewport = page1.getViewport({ scale });
      pdfPreview.width = viewport.width;
      pdfPreview.height = viewport.height;
      await page1.render({ canvasContext: pdfPreview.getContext('2d'), viewport }).promise;

      if (signatures.length) {
        signatureBox.style.display = 'block';
      }
    }

    function updateSignButton() {
      const hasChecked = pdfEntries.some((e) => e.checked);
      signNowBtn.disabled = !hasChecked || !signatures.length;
    }

    function getPlacementRatios() {
      const boxRect = signatureBox.getBoundingClientRect();
      const canvasRect = pdfPreview.getBoundingClientRect();
      const x = (boxRect.left - canvasRect.left) / canvasRect.width;
      const y = (boxRect.top - canvasRect.top) / canvasRect.height;
      const w = boxRect.width / canvasRect.width;
      const h = boxRect.height / canvasRect.height;
      return {
        x: Math.min(Math.max(x, 0), 1),
        y: Math.min(Math.max(y, 0), 1),
        w: Math.min(Math.max(w, 0.01), 1),
        h: Math.min(Math.max(h, 0.01), 1)
      };
    }

    signNowBtn.addEventListener('click', async () => {
      try {
        signNowBtn.disabled = true;
        signNowBtn.textContent = 'Signing...';

        const sig = signatures[Number(signatureSelect.value)] || signatures[0];
        if (!sig) throw new Error('No signature selected.');

        const sigResp = await fetch(sig.dataUrl);
        const sigBytes = await sigResp.arrayBuffer();
        const ratios = getPlacementRatios();

        const zip = new JSZip();
        const targets = pdfEntries.filter((e) => e.checked);

        for (const entry of targets) {
          const doc = await PDFDocument.load(entry.bytes);
          const isPng = sig.type.includes('png') || sig.dataUrl.startsWith('data:image/png');
          const embedded = isPng
            ? await doc.embedPng(sigBytes)
            : await doc.embedJpg(sigBytes);

          doc.getPages().forEach((page) => {
            const pw = page.getWidth();
            const ph = page.getHeight();
            const width = pw * ratios.w;
            const height = ph * ratios.h;
            const x = pw * ratios.x;
            const yTop = ph * ratios.y;
            const y = ph - yTop - height;

            page.drawImage(embedded, { x, y, width, height });
          });

          const out = await doc.save();
          const base = entry.name.replace(/\.pdf$/i, '');
          zip.file(`${base}_signed.pdf`, out);
        }

        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'signed_pdfs.zip';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (err) {
        alert(`Failed to sign PDFs: ${err.message}`);
      } finally {
        signNowBtn.textContent = 'Sign now';
        updateSignButton();
      }
    });

    // Drag behavior for signature box
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    signatureBox.addEventListener('pointerdown', (e) => {
      if (e.target !== signatureBox) return;
      dragging = true;
      const rect = signatureBox.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      signatureBox.setPointerCapture(e.pointerId);
    });

    signatureBox.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const canvasRect = pdfPreview.getBoundingClientRect();
      const boxRect = signatureBox.getBoundingClientRect();
      const left = Math.min(
        Math.max(e.clientX - canvasRect.left - offsetX, 0),
        canvasRect.width - boxRect.width
      );
      const top = Math.min(
        Math.max(e.clientY - canvasRect.top - offsetY, 0),
        canvasRect.height - boxRect.height
      );
      signatureBox.style.left = `${left}px`;
      signatureBox.style.top = `${top}px`;
    });

    function endDrag(e) {
      dragging = false;
      try { signatureBox.releasePointerCapture(e.pointerId); } catch (_) {}
    }

    signatureBox.addEventListener('pointerup', endDrag);
    signatureBox.addEventListener('pointercancel', endDrag);

    window.addEventListener('resize', () => {
      if (selectedPdfId) renderMainPreview();
    });

    loadSignatures();
    renderMainPreview();
    updateSignButton();
  </script>
</body>
</html>
